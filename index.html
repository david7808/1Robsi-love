<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Robsi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: black; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        
        .background-photo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('robsi.png');
            background-size: cover; background-position: center;
            filter: brightness(0.4); z-index: -2;
        }

        .text-container { text-align: center; color: white; position: relative; z-index: 10; cursor: pointer; }
        
        .fade-text {
            font-size: 2rem; font-weight: bold; text-shadow: 0 0 15px red;
            opacity: 0; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); width: 85vw;
            animation: textCycle 12s infinite;
        }

        .text1 { animation-delay: 0s; }
        .text2 { animation-delay: 4s; }
        .text3 { animation-delay: 8s; }

        @keyframes textCycle {
            0%, 25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            33%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        .heart { position: absolute; color: #ff4d4d; animation: float 5s linear infinite; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>
    <div class="background-photo"></div>
    
    <audio id="loveSong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="text-container" onclick="document.getElementById('loveSong').play()">
        <div class="fade-text text1">የእኔ ፍቅር Robsi በጣም ነው የምወድሽ ❤️</div>
        <div class="fade-text text2">አንቺ የእኔ ልዩ ስጦታ ነሽ 🎁</div>
        <div class="fade-text text3">በጣም ነው የማፈቅርሽ 💖</div>
        <p style="color: #ccc; margin-top: 150px; font-size: 0.9rem;">(ሙዚቃው እንዲከፈት ስክሪኑን ንካው 🎵)</p>
    </div>

    <div id="hearts"></div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart'; heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
